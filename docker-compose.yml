services:
  # --- DEVELOPMENT (Hybrid Mode) ---
  # Connects to your Host Chrome for Auth/Testing
  agent-dev:
    build: .
    profiles: ["dev"]
    container_name: agent-dev
    entrypoint: tail -f /dev/null
    volumes:
      - .:/app
      - ./output:/output
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- PRODUCTION (Standalone Mode) ---
  # Runs its own browser in a sidecar container
  agent-prod:
    build: .
    profiles: ["prod"]
    depends_on:
      - browser
    volumes:
      - ./output:/output
    env_file: .env

  # The Standalone Browser for Production
  browser:
    image: ghcr.io/browserless/chromium:latest
    profiles: ["prod"]
    ports:
      - "3000:3000"